<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智学数理 - 注册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "微软雅黑", sans-serif;
            background: url("images/注册页背景图.jpg") no-repeat center center;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before{
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(6px);
            z-index: -1;
        }

        .register-box {
            background: rgba(255,255,255,0.9);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            width: 360px;
        }

        .register-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }

        .form-item {
            margin-bottom: 20px;
        }

        .form-item label {
            display: block;
            margin-bottom: 6px;
            color: #333;
        }

        .form-item input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg,#4096ff,#2168e3);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .login-link a {
            color: #2168e3;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="register-box">
    <h2>用户注册</h2>
    <div class="form-item">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名">
    </div>
    <div class="form-item">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码">
    </div>
    <div class="form-item">
        <label>学号</label>
        <input type="text" id="stuId" placeholder="请输入学号">
    </div>

    <button class="btn" onclick="registerToBackend()">立即注册</button>

    <div class="login-link">
        已有账号？<a href="login.html">去登录</a>
    </div>
</div>

<script>
    async function registerToBackend() {
        let username = document.getElementById("username").value.trim();
        let password = document.getElementById("password").value.trim();
        let stuId = document.getElementById("stuId").value.trim();

        if (!username || !password || !stuId) {
            alert("请填写完整信息！");
            return;
        }

        try {
            const res = await fetch('/user/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                    // stuId 如果需要，后端也要支持
                })
            });

            const data = await res.json();

            if (data.code === 200) {
                alert("注册成功！");
                location.href = "login.html";
            } else {
                alert("注册失败：" + (data.msg || '用户名已存在'));
            }
        } catch (err) {
            alert("网络异常，注册失败");
            console.log(err);
        }
    }
</script>

</body>
</html>
