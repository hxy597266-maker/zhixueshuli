<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智学数理 - 管理员后台</title>

    <script src="js/auth.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:"微软雅黑",sans-serif;
            background:#f0f5ff;
            min-height:100vh;
        }

        .nav{
            background:#2c3e50;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .nav-title{
            color:white;
            font-size:22px;
            font-weight:bold;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            margin-left:20px;
        }

        .container{
            max-width:1100px;
            margin:40px auto;
            padding:0 20px;
        }

        .stats-row{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:20px;
            margin-bottom:30px;
        }

        .stat-item{
            background:white;
            padding:25px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 3px 12px rgba(0,0,0,0.08);
        }

        .stat-item h4{
            color:#2168e3;
            font-size:28px;
            margin-bottom:8px;
        }

        .stat-item p{
            color:#666;
        }

        .admin-card{
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 3px 12px rgba(0,0,0,0.08);
            margin-bottom:30px;
        }

        .admin-card h3{
            margin-bottom:20px;
            color:#2c3e50;
            border-bottom:1px solid #eee;
            padding-bottom:10px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            padding:12px;
            border-bottom:1px solid #eee;
            text-align:left;
        }

        th{
            background:#f8f9ff;
            color:#2c3e50;
        }

        .btn{
            border:none;
            padding:6px 12px;
            border-radius:5px;
            cursor:pointer;
            font-size:13px;
        }

        .btn-del{
            background:#e74c3c;
            color:white;
        }

        .admin-login-box{
            width:400px;
            margin:120px auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 3px 12px rgba(0,0,0,0.08);
        }

        .admin-login-box h3{
            text-align:center;
            margin-bottom:20px;
            color:#2c3e50;
        }

        .admin-login-box input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ddd;
            border-radius:6px;
        }

        .admin-login-box button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            background:linear-gradient(135deg,#4096ff,#2168e3);
            color:white;
            font-weight:bold;
        }
    </style>
</head>

<body>

<!-- 登录框 -->
<div class="admin-login-box" id="loginBox">

    <h3>管理员登录</h3>

    <input
            type="text"
            id="adminUser"
            placeholder="管理员账号"
            value="admin1"
    >

    <input
            type="password"
            id="adminPwd"
            placeholder="管理员密码"
            value="admin123"
    >

    <button onclick="adminLogin()">
        登录后台
    </button>

</div>

<!-- 后台 -->
<div id="adminPanel" style="display:none;">

    <div class="nav">

        <div class="nav-title">
            智学数理 - 管理员后台
        </div>

        <div class="nav-links">
            <a href="index.html">返回首页</a>
            <a href="javascript:adminLogout()">退出后台</a>
        </div>

    </div>

    <div class="container">

        <!-- 统计 -->
        <div class="stats-row">

            <div class="stat-item">
                <h4 id="userCount">0</h4>
                <p>注册用户数</p>
            </div>

            <div class="stat-item">
                <h4 id="postCount">0</h4>
                <p>社区帖子数</p>
            </div>

            <div class="stat-item">
                <h4 id="commentCount">0</h4>
                <p>评论总数</p>
            </div>

        </div>

        <!-- 用户 -->
        <div class="admin-card">

            <h3>用户管理</h3>

            <table>

                <thead>
                <tr>
                    <th>用户ID</th>
                    <th>用户名</th>
                    <th>操作</th>
                </tr>
                </thead>

                <tbody id="userTable"></tbody>

            </table>

        </div>

        <!-- 帖子 -->
        <div class="admin-card">

            <h3>帖子管理</h3>

            <table>

                <thead>
                <tr>
                    <th>ID</th>
                    <th>发布者</th>
                    <th>标题</th>
                    <th>操作</th>
                </tr>
                </thead>

                <tbody id="postTable"></tbody>

            </table>

        </div>

        <!-- 评论 -->
        <div class="admin-card">

            <h3>评论管理</h3>

            <table>

                <thead>
                <tr>
                    <th>评论ID</th>
                    <th>帖子ID</th>
                    <th>评论者</th>
                    <th>内容</th>
                    <th>操作</th>
                </tr>
                </thead>

                <tbody id="commentTable"></tbody>

            </table>

        </div>

    </div>

</div>

<script>

    // 页面加载
    //  检查是否已登录且是管理员
    window.onload = async function(){
        if (isLoggedIn()) {
            const user = await getCurrentUser();

            // --- 把这一行加在这里 ---
            console.log("当前用户信息:", user);
            console.log("当前用户权限 role:", user ? user.role : "未获取到");
            // ----------------------

            if (user && user.role === 1) {  // role=1 是管理员
                document.getElementById("loginBox").style.display = "none";
                document.getElementById("adminPanel").style.display = "block";
                loadAllData();
            } else {
                alert("您不是管理员，无权访问");
                location.href = "index.html";
            }
        }
    }



    // 管理员登录
    async function adminLogin() {

        const username =
            document.getElementById("adminUser").value.trim();

        const password =
            document.getElementById("adminPwd").value.trim();

        try {

            const res = await fetch('/user/admin/login', {

                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({
                    username,
                    password
                })
            });

            const data = await res.json();

            if (data.code === 200) {

                saveToken(data.data);

                document.getElementById("loginBox").style.display = "none";

                document.getElementById("adminPanel").style.display = "block";

                loadAllData();

            } else {

                alert(data.msg || "登录失败");
            }

        } catch (err) {

            console.error(err);

            alert("请求失败");
        }
    }


    // 退出
    function adminLogout() {
        logout();
    }


    // 加载全部
    async function loadAllData() {

        await loadUserList();

        await loadPostList();

        await loadCommentList();
    }


    // 用户列表
    async function loadUserList() {

        try {

            const res = await fetchWithAuth('/user/list');

            const data = await res.json();

            if (data.code === 200) {

                const list = data.data;

                document.getElementById("userCount").innerText =
                    list.length;

                let html = "";

                list.forEach(u => {

                    html += `
                    <tr>
                        <td>${u.id}</td>
                        <td>${u.username}</td>
                        <td>
                            <button
                                class="btn btn-del"
                                onclick="delUser('${u.id}')">
                                删除
                            </button>
                        </td>
                    </tr>
                    `;
                });

                document.getElementById("userTable").innerHTML =
                    html;
            }

        } catch (err) {

            console.error(err);

            document.getElementById("userTable").innerHTML =
                "<tr><td colspan='3'>加载失败</td></tr>";
        }
    }


    // 删除用户
    async function delUser(userId) {

        if (!confirm("确定删除该用户？")) {
            return;
        }

        try {

            const res =
                await fetchWithAuth(
                    '/user/delete/' + String(userId),
                    {
                        method: 'DELETE'
                    }
                );

            const data = await res.json();

            if (data.code === 200) {

                alert("删除成功");

                loadAllData();

            } else {

                alert(data.msg || "删除失败");
            }

        } catch (err) {

            console.error(err);

            alert("请求失败");
        }
    }


    // 加载帖子列表（适配分页版接口）
    async function loadPostList() {
        try {
            // 获取第一页，每页 100 条（后台管理通常需要看全量）
            const res = await fetchWithAuth('/post/list?page=1&size=100');
            const data = await res.json();

            if (data.code !== 200) {
                alert('加载帖子失败');
                return;
            }

            // 修改：读取 data.data.list 而不是 data.data
            const list = data.data.list || [];

            //  修改：把 totalPosts 改为 postCount，与 HTML 中的 ID 一致
            document.getElementById('postCount').innerText = data.data.total || 0;

            let html = '';
            list.forEach(p => {
                html += `
                    <tr>
                        <td>${p.id}</td>
                        <td>${p.username || '匿名'}</td>
                        <td>${p.title}</td>
                        <td>
                            <button onclick="delPost(${p.id})" style="background: #ff4d4f; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">删除</button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('postTable').innerHTML = html;

        } catch (err) {
            console.error(err);
        }
    }


    // 删除帖子
    async function delPost(postId) {

        if (!confirm("确定删除帖子？")) {
            return;
        }

        try {

            const res =
                await fetchWithAuth(
                    '/post/delete/' + String(postId),
                    {
                        method: 'DELETE'
                    }
                );

            const data = await res.json();

            if (data.code === 200) {

                alert("删除成功");

                loadAllData();

            } else {

                alert(data.msg || "删除失败");
            }

        } catch (err) {

            console.error(err);

            alert("请求失败");
        }
    }


    // 评论列表
    async function loadCommentList() {

        try {

            const res = await fetchWithAuth('/comment/all');

            const data = await res.json();

            if (data.code === 200) {

                const list = data.data;

                document.getElementById("commentCount").innerText =
                    list.length;

                let html = "";

                list.forEach(c => {

                    html += `
                    <tr>
                        <td>${c.id}</td>
                        <td>${c.postId}</td>
                        <td>${c.username}</td>
                        <td>${c.content}</td>
                        <td>
                            <button
                                class="btn btn-del"
                                onclick="delComment('${c.id}')">
                                删除
                            </button>
                        </td>
                    </tr>
                    `;
                });

                document.getElementById("commentTable").innerHTML =
                    html;
            }

        } catch (err) {

            console.error(err);

            document.getElementById("commentTable").innerHTML =
                "<tr><td colspan='5'>加载失败</td></tr>";
        }
    }


    // 删除评论
    async function delComment(commentId) {

        if (!confirm("确定删除评论？")) {
            return;
        }

        try {

            const res =
                await fetchWithAuth(
                    '/comment/delete/' + String(commentId),
                    {
                        method: 'DELETE'
                    }
                );

            const data = await res.json();

            if (data.code === 200) {

                alert("删除成功");

                loadAllData();

            } else {

                alert(data.msg || "删除失败");
            }

        } catch (err) {

            console.error(err);

            alert("请求失败");
        }
    }

</script>

</body>
</html>
