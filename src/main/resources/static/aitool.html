<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智学数理 - AI答疑工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "微软雅黑", sans-serif; background-color: #f0f5ff; }
        /* 导航栏 */
        .nav { background: #2c3e50; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .nav-title { font-size: 22px; font-weight: bold; }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; }
        /* 页面标题 */
        .page-title { max-width: 1000px; margin: 30px auto 0; padding: 0 20px; color: #2c3e50; text-align: center; }
        /* 聊天容器 */
        .chat-container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .chat-box { background: white; border-radius: 10px; box-shadow: 0 3px 12px rgba(0,0,0,0.08); height: 450px; padding: 20px; overflow-y: auto; margin-bottom: 20px; }
        .message { margin-bottom: 15px; }
        .user-msg { text-align: right; }
        .user-msg .content { display: inline-block; background: linear-gradient(135deg,#4096ff,#2168e3); color: white; padding: 10px 15px; border-radius: 15px; max-width: 70%; }
        .ai-msg { text-align: left; }
        .ai-msg .content { display: inline-block; background: #f0f0f0; color: #333; padding: 10px 15px; border-radius: 15px; max-width: 70%; }
        /* 输入区域 */
        .input-area { display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .send-btn { padding: 12px 25px; background: linear-gradient(135deg,#4096ff,#2168e3); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<!-- 导航栏 -->
<div class="nav">
    <div class="nav-title">智学数理</div>
    <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="course.html">课程学习</a>
        <a href="community.html">学习社区</a>
        <a href="aitool.html">AI工具</a>
        <span id="userNav"></span>
    </div>
</div>

<div class="page-title">
    <h1>AI数理答疑工具</h1>
    <p style="color: #666; margin-top: 8px;">输入你的问题，AI为你提供解题思路和知识点解析</p>
</div>

<div class="chat-container">
    <div class="chat-box" id="chatBox">
        <!-- 初始AI欢迎消息 -->
        <div class="message ai-msg">
            <div class="content">你好！我是智学助手，有什么高数、线代、离散数学的问题都可以问我~</div>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="输入你的问题，比如：怎么求函数的导数？">
        <button class="send-btn" onclick="sendMessage()">发送</button>
    </div>
</div>

<script>
    // ----------- 在这里填 DeepSeek Key -----------
    const API_KEY = "sk-7fd0821da80e491e986bbed23829bb76";
    const API_URL = "https://api.deepseek.com/v1/chat/completions";
    // ----------------------------------------------------

    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // 显示用户消息
        chatBox.innerHTML += `<div class="message user-msg"><div class="content">${text}</div></div>`;
        userInput.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "deepseek-chat",
                    messages: [
                        { role: "system", content: "你是一个擅长数理化的AI助手，回答简洁准确。" },
                        { role: "user", content: text }
                    ],
                    stream: false
                })
            });

            const data = await res.json();
            const reply = data.choices[0].message.content;

            chatBox.innerHTML += `<div class="message ai-msg"><div class="content">${reply}</div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (err) {
            chatBox.innerHTML += `<div class="message ai-msg"><div class="content">AI 服务暂时不可用</div></div>`;
            console.error(err);
        }
    }
</script>

<script>
    const baseUrl = "/zhixueshuli";
</script>


<script>
    // ====================== 导航栏登录状态======================
    window.onload = function(){
        let username = localStorage.getItem("username");
        let nav = document.getElementById("userNav");

        if(username){
            nav.innerHTML = `
                <a href="profile.html">个人中心</a>
                <a href="javascript:logout()">退出</a>
            `;
        }else{
            nav.innerHTML = `<a href="login.html">登录/注册</a>`;
        }
    }

    function logout(){
        localStorage.removeItem("username");
        alert("已退出登录");
        location.href = "login.html";
    }
</script>

</body>
</html>
