<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智学数理 - 登录</title>
    <link rel="stylesheet" href="/css/common.css">
    <script src="js/auth.js"></script>
    <style>
        /* login.html 特有样式 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: white;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 380px;
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
            font-size: 24px;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>用户登录</h2>
    <div class="form-item">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" value="">
    </div>
    <div class="form-item">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" value="">
    </div>

    <button class="btn" onclick="login()">立即登录</button>

    <div class="register-link">
        没有账号？<a href="register.html">立即注册</a>
    </div>
</div>

<script>
    function login() {
        let username = document.getElementById("username").value.trim();
        let password = document.getElementById("password").value.trim();

        if (!username || !password) {
            alert("请输入用户名和密码！");
            return;
        }

        //  新的 Spring Boot 接口
        fetch('/user/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({username: username, password: password})
        })
            .then(res => res.json())
            .then(data => {
                if(data.code === 200){

                    saveToken(data.data);

                    localStorage.setItem("username", username);

                    alert("登录成功");

                    location.href = "index.html";
                } else {
                    alert(data.msg || "账号或密码错误！");
                }
            })
            .catch(err => {
                alert("服务器连接失败！");
                console.error(err);
            });
    }
</script>

</body>
</html>
